<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self';">
  <title>1日タイムライン記録アプリ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 600px;
      padding: 2.5rem 1.5rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
      color: #1a1a1a;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* Buttons */
    .btn {
      padding: 0.7rem 1.8rem;
      border: 1px solid #2c2c2c;
      background: #2c2c2c;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover { background: #444; border-color: #444; }

    .btn-outline {
      background: #fff;
      color: #2c2c2c;
    }
    .btn-outline:hover { background: #f5f5f5; }

    .btn-danger {
      background: #fff;
      color: #c00;
      border-color: #c00;
    }
    .btn-danger:hover { background: #fff5f5; }

    .btn-sm {
      padding: 0.35rem 0.8rem;
      font-size: 0.8rem;
    }

    /* ===== Screen 1: Start ===== */
    .start-screen {
      text-align: center;
      padding-top: 5rem;
    }
    .start-screen p {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .start-screen .btn { display: block; width: 100%; margin-bottom: 0.8rem; }

    /* ===== Screen 2: Recording ===== */
    .recording-header {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .input-row input {
      flex: 1;
      padding: 0.65rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
    }
    .input-row input:focus { border-color: #2c2c2c; }

    .entry-list {
      list-style: none;
      margin-bottom: 2rem;
    }
    .entry-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 0;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
    }
    .entry-list li .entry-actions {
      display: flex;
      gap: 0.3rem;
      align-items: center;
    }
    .entry-list li .delete-btn,
    .entry-list li .edit-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem 0.4rem;
      line-height: 1;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .entry-list li .delete-btn:hover { color: #c00; border-color: #c00; }
    .entry-list li .edit-btn:hover { color: #333; border-color: #333; }
    .entry-list .edit-row {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      width: 100%;
      padding: 0.3rem 0;
    }
    .entry-list .edit-row input[type="time"] {
      padding: 0.3rem 0.4rem;
      border: 2px solid #333;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: "SF Mono", "Menlo", monospace;
      outline: none;
    }
    .entry-list .edit-row input[type="text"] {
      flex: 1;
      padding: 0.3rem 0.5rem;
      border: 2px solid #333;
      border-radius: 4px;
      font-size: 0.85rem;
      outline: none;
    }
    .entry-list .edit-row button {
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      border: 1px solid #ddd;
      background: #fff;
      color: #999;
      border-radius: 4px;
      cursor: pointer;
    }
    .entry-list .edit-row .save-btn:hover { color: #333; border-color: #333; }
    .entry-list .edit-row .cancel-btn:hover { color: #c00; border-color: #c00; }

    .recording-footer {
      text-align: center;
      margin-top: 1rem;
    }

    /* ===== Screen 3: Summary ===== */
    .summary-section {
      margin-bottom: 2rem;
    }
    .summary-section h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #1a1a1a;
    }
    .summary-entry {
      padding: 0.4rem 0;
      font-size: 0.95rem;
      color: #1a1a1a;
    }
    .time-aggregate {
      padding: 0.35rem 0;
      font-size: 0.95rem;
    }
    .chart-container {
      display: flex;
      justify-content: center;
      margin: 1rem 0;
    }
    .chart-container canvas {
      max-width: 100%;
    }
    .chart-legend {
      list-style: none;
      margin-top: 0.8rem;
    }
    .chart-legend li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.2rem 0;
      font-size: 0.85rem;
    }
    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .summary-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 2rem;
    }
    .summary-buttons .btn { width: 100%; }

    /* ===== Screen 4: History ===== */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .session-card {
      border: 1px solid #eee;
      border-radius: 6px;
      margin-bottom: 0.6rem;
      overflow: hidden;
    }
    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      background: #fafafa;
      transition: background 0.15s;
      font-size: 0.9rem;
    }
    .session-header:hover { background: #f0f0f0; }
    .session-header .session-info { flex: 1; }
    .session-header .session-meta {
      color: #666;
      font-size: 0.8rem;
      margin-left: 0.5rem;
      white-space: nowrap;
    }
    .session-detail {
      display: none;
      padding: 1rem;
      border-top: 1px solid #eee;
    }
    .session-detail.open { display: block; }
    .session-detail .summary-section { margin-bottom: 1.2rem; }
    .session-detail h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid #ddd;
    }
    .session-delete-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.3rem 0.5rem;
    }
    .session-delete-btn:hover { color: #c00; }

    .week-summary {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.6rem;
      font-size: 0.88rem;
    }
    .week-summary .week-title {
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .week-summary .week-top {
      color: #666;
      font-size: 0.83rem;
    }

    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #eee;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem 0;
      background: none;
      border: none;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      color: #999;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: #1a1a1a;
      border-bottom-color: #1a1a1a;
      font-weight: 600;
    }

    .empty-msg {
      text-align: center;
      color: #999;
      padding: 3rem 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Screen 1: Start -->
    <div id="screen-start" class="screen active">
      <h1>1日タイムライン記録</h1>
      <div class="start-screen">
        <p>行動を時刻付きで記録して、1日を振り返ろう</p>
        <button class="btn" onclick="startRecording()">スタート</button>
        <button class="btn btn-outline" onclick="showHistory()">過去の記録を見る</button>
      </div>
    </div>

    <!-- Screen 2: Recording -->
    <div id="screen-recording" class="screen">
      <h1>1日タイムライン記録</h1>
      <div class="recording-header" id="recording-start-label"></div>
      <div class="input-row">
        <input type="text" id="action-input" placeholder="今まで何をしていましたか？" />
        <button class="btn" onclick="registerEntry()">登録</button>
      </div>
      <ul class="entry-list" id="entry-list"></ul>
      <div class="recording-footer">
        <button class="btn btn-outline" onclick="endRecording()">終了</button>
      </div>
    </div>

    <!-- Screen 3: Summary -->
    <div id="screen-summary" class="screen">
      <h1>1日タイムライン記録</h1>
      <div id="summary-content"></div>
      <div class="summary-buttons">
        <button class="btn" id="copy-btn" onclick="copySummary()">コピー</button>
        <button class="btn btn-outline" onclick="saveAndExit()">保存して終了</button>
        <button class="btn btn-danger" onclick="exitWithoutSave()">保存せずに終了</button>
      </div>
    </div>

    <!-- Screen 4: History -->
    <div id="screen-history" class="screen">
      <h1>1日タイムライン記録</h1>
      <div class="history-header">
        <button class="btn btn-sm btn-outline" onclick="showScreen('start')">&larr; 戻る</button>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('sessions', this)">記録一覧</button>
        <button class="tab-btn" onclick="switchTab('weekly', this)">週次サマリー</button>
      </div>
      <div id="tab-sessions"></div>
      <div id="tab-weekly" style="display:none;"></div>
    </div>
  </div>

  <script>
    /* =========================================
       State
    ========================================= */
    let currentSession = null; // { id, date, startTime, entries:[] }
    const STORAGE_KEY = 'timeline_sessions';
    const MAX_SESSIONS = 365;

    /* =========================================
       Utilities
    ========================================= */
    function pad(n) { return String(n).padStart(2, '0'); }

    function nowHHMM() {
      const d = new Date();
      return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function todayDate() {
      const d = new Date();
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }

    function timeToMin(hhmm) {
      const [h, m] = hhmm.split(':').map(Number);
      return h * 60 + m;
    }

    function minToLabel(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      if (h === 0) return m + '分';
      if (m === 0) return h + '時間';
      return h + '時間' + m + '分';
    }

    function dayOfWeek(dateStr) {
      const days = ['日','月','火','水','木','金','土'];
      return days[new Date(dateStr).getDay()];
    }

    function getWeekStart(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday start
      const monday = new Date(d);
      monday.setDate(diff);
      return monday.getFullYear() + '/' + pad(monday.getMonth() + 1) + '/' + pad(monday.getDate());
    }

    /* =========================================
       LocalStorage
    ========================================= */
    function loadSessions() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function saveSessions(sessions) {
      // Keep max 365 sessions, remove oldest
      sessions.sort(function(a, b) { return Number(b.id) - Number(a.id); });
      if (sessions.length > MAX_SESSIONS) {
        sessions = sessions.slice(0, MAX_SESSIONS);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    /* =========================================
       Screen Management
    ========================================= */
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById('screen-' + name).classList.add('active');
    }

    /* =========================================
       Screen 1: Start
    ========================================= */
    function startRecording() {
      currentSession = {
        id: String(Date.now()),
        date: todayDate(),
        startTime: nowHHMM(),
        endTime: null,
        entries: []
      };
      document.getElementById('recording-start-label').textContent = '開始：' + currentSession.startTime;
      document.getElementById('entry-list').innerHTML = '';
      document.getElementById('action-input').value = '';
      showScreen('recording');
      document.getElementById('action-input').focus();
    }

    /* =========================================
       Screen 2: Recording
    ========================================= */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('screen-recording').classList.contains('active')) {
        var input = document.getElementById('action-input');
        if (document.activeElement === input && input.value.trim()) {
          registerEntry();
        }
      }
    });

    function registerEntry() {
      var input = document.getElementById('action-input');
      var label = input.value.trim();
      if (!label) return;
      currentSession.entries.push({ time: nowHHMM(), label: label });
      input.value = '';
      input.focus();
      renderEntryList();
    }

    function deleteEntry(idx) {
      currentSession.entries.splice(idx, 1);
      renderEntryList();
    }

    function editEntry(idx) {
      currentSession.entries[idx].editing = true;
      renderEntryList();
    }

    function saveEditEntry(idx) {
      var timeVal = document.getElementById('editTime' + idx).value;
      var labelVal = document.getElementById('editLabel' + idx).value.trim();
      if (!labelVal) return;
      currentSession.entries[idx].time = timeVal;
      currentSession.entries[idx].label = labelVal;
      delete currentSession.entries[idx].editing;
      renderEntryList();
    }

    function cancelEditEntry(idx) {
      delete currentSession.entries[idx].editing;
      renderEntryList();
    }

    function renderEntryList() {
      var ul = document.getElementById('entry-list');
      ul.innerHTML = '';
      currentSession.entries.forEach(function(e, i) {
        var li = document.createElement('li');
        if (e.editing) {
          var row = document.createElement('div');
          row.className = 'edit-row';
          var timeInput = document.createElement('input');
          timeInput.type = 'time';
          timeInput.value = e.time;
          timeInput.id = 'editTime' + i;
          var labelInput = document.createElement('input');
          labelInput.type = 'text';
          labelInput.value = e.label;
          labelInput.id = 'editLabel' + i;
          var saveBtn = document.createElement('button');
          saveBtn.className = 'save-btn';
          saveBtn.textContent = '保存';
          saveBtn.onclick = function() { saveEditEntry(i); };
          var cancelBtn = document.createElement('button');
          cancelBtn.className = 'cancel-btn';
          cancelBtn.textContent = '取消';
          cancelBtn.onclick = function() { cancelEditEntry(i); };
          row.appendChild(timeInput);
          row.appendChild(labelInput);
          row.appendChild(saveBtn);
          row.appendChild(cancelBtn);
          li.appendChild(row);
        } else {
          var span = document.createElement('span');
          span.textContent = '\u301C' + e.time + '\u3000' + e.label;
          var actions = document.createElement('span');
          actions.className = 'entry-actions';
          var editBtn = document.createElement('button');
          editBtn.className = 'edit-btn';
          editBtn.textContent = '編集';
          editBtn.onclick = function() { editEntry(i); };
          var delBtn = document.createElement('button');
          delBtn.className = 'delete-btn';
          delBtn.textContent = '\u00D7';
          delBtn.onclick = function() { deleteEntry(i); };
          actions.appendChild(editBtn);
          actions.appendChild(delBtn);
          li.appendChild(span);
          li.appendChild(actions);
        }
        ul.appendChild(li);
      });
    }

    function endRecording() {
      if (currentSession.entries.length === 0) {
        if (!confirm('行動が登録されていません。終了しますか？')) return;
      }
      currentSession.endTime = nowHHMM();
      renderSummary(currentSession, document.getElementById('summary-content'));
      document.getElementById('copy-btn').textContent = 'コピー';
      showScreen('summary');
    }

    /* =========================================
       Time Calculation
    ========================================= */
    function calcDurations(session) {
      var entries = session.entries;
      if (entries.length === 0) return [];
      var durations = [];
      for (var i = 0; i < entries.length; i++) {
        var startMin;
        if (i === 0) {
          startMin = timeToMin(session.startTime);
        } else {
          startMin = timeToMin(entries[i - 1].time);
        }
        var endMin;
        if (i === entries.length - 1 && session.endTime) {
          endMin = timeToMin(session.endTime);
        } else if (i < entries.length - 1) {
          endMin = timeToMin(entries[i].time);
        } else {
          endMin = timeToMin(entries[i].time);
        }
        // Handle crossing midnight simply
        var dur = endMin - startMin;
        if (dur < 0) dur += 1440;

        // Correction: duration for entry i is from previous marker to this entry's time
        // First entry: startTime -> entry[0].time
        // Entry i (i>0): entry[i-1].time -> entry[i].time
        // BUT the last entry also needs: entry[last].time -> endTime
        // So we actually track intervals, not per-entry
        durations.push({ label: entries[i].label, minutes: 0 });
      }

      // Recalculate properly
      durations = [];
      for (var i = 0; i < entries.length; i++) {
        var from = (i === 0) ? timeToMin(session.startTime) : timeToMin(entries[i - 1].time);
        var to = timeToMin(entries[i].time);
        var dur = to - from;
        if (dur < 0) dur += 1440;
        durations.push({ label: entries[i].label, minutes: dur });
      }
      // Last entry -> endTime
      if (session.endTime) {
        var lastFrom = timeToMin(entries[entries.length - 1].time);
        var lastTo = timeToMin(session.endTime);
        var lastDur = lastTo - lastFrom;
        if (lastDur < 0) lastDur += 1440;
        // We need to attribute this time. According to spec:
        // "最後の行動の所要時間 = 終了ボタン押下時刻 - 最後の行動の登録時刻"
        // This means the last entry's duration should include its own time segment
        // Actually re-reading the spec:
        // - 各行動の所要時間 = 次の行動の登録時刻 - 自分の登録時刻
        // - 最初の行動の所要時間 = 最初の行動の登録時刻 - セッション開始時刻
        // - 最後の行動の所要時間 = 終了ボタン押下時刻 - 最後の行動の登録時刻
        // So the first entry's duration = entry[0].time - startTime
        // Middle entry's duration = entry[i+1].time - entry[i].time
        // Last entry's duration = endTime - entry[last].time
        // This is what we computed for entries 0..n-2, but entry n-1 we computed as
        // entry[n-2].time -> entry[n-1].time, which is actually the middle pattern.
        // The last entry needs: entry[n-1].time -> endTime
        // So we need to fix the last entry.
        if (entries.length >= 1) {
          // Adjust: the duration we computed for the last entry (entries[n-1]) is
          // from entries[n-2].time to entries[n-1].time (the "middle" pattern).
          // But its actual duration should be entries[n-1].time to endTime.
          // So replace the last entry's duration.
          durations[durations.length - 1].minutes = lastDur;
          // And we need to add the middle segment if entries > 1
          // Wait, let me re-think this completely.
        }
      }

      // Let's just redo this cleanly
      durations = [];
      // intervals[i] = { label, minutes }
      // interval 0: startTime -> entries[0].time, label = entries[0].label
      // interval i (0 < i < n): entries[i-1].time -> entries[i].time, label = entries[i].label
      // interval for last: entries[n-1].time -> endTime, label = entries[n-1].label
      // Wait no - re-reading spec again carefully:
      // 最初の行動の所要時間 = 最初の行動の登録時刻 - セッション開始時刻
      // This means the first action's duration is from session start to the time it was registered.
      // 各行動の所要時間 = 次の行動の登録時刻 - 自分の登録時刻
      // 最後の行動の所要時間 = 終了ボタン押下時刻 - 最後の行動の登録時刻
      //
      // So: entry[0].duration = entry[0].time - startTime
      //     entry[i].duration = entry[i+1].time - entry[i].time  (for 0 < i < n-1)
      //     entry[n-1].duration = endTime - entry[n-1].time

      for (var i = 0; i < entries.length; i++) {
        var from, to;
        if (i === 0) {
          // First: startTime -> entry[0].time
          from = timeToMin(session.startTime);
          to = timeToMin(entries[0].time);
        } else {
          // Middle: entry[i-1].time -> entry[i].time  (but spec says next - self)
          // Actually spec says: 各行動の所要時間 = 次の行動の登録時刻 - 自分の登録時刻
          // So entry[i].duration for middle = entry[i+1].time - entry[i].time
          // But this would leave entry[i] undefined until we know entry[i+1]
          // Let me re-map:
          // entry[0].duration = entry[0].time - startTime
          // entry[i].duration (0<i<n-1) = entry[i+1].time - entry[i].time
          // entry[n-1].duration = endTime - entry[n-1].time
          if (i < entries.length - 1) {
            from = timeToMin(entries[i].time);
            to = timeToMin(entries[i + 1].time);
          } else {
            from = timeToMin(entries[i].time);
            to = session.endTime ? timeToMin(session.endTime) : timeToMin(entries[i].time);
          }
        }
        var dur = to - from;
        if (dur < 0) dur += 1440;
        durations.push({ label: entries[i].label, minutes: dur });
      }

      return durations;
    }

    function aggregateDurations(durations) {
      var map = {};
      durations.forEach(function(d) {
        if (!map[d.label]) map[d.label] = 0;
        map[d.label] += d.minutes;
      });
      var arr = [];
      for (var k in map) {
        arr.push({ label: k, minutes: map[k] });
      }
      arr.sort(function(a, b) { return b.minutes - a.minutes; });
      return arr;
    }

    /* =========================================
       Pie Chart (Canvas)
    ========================================= */
    var CHART_COLORS = [
      '#2c2c2c', '#555555', '#777777', '#999999', '#aaaaaa',
      '#bbbbbb', '#cccccc', '#dddddd', '#444444', '#666666',
      '#888888', '#3a3a3a', '#4d4d4d', '#6b6b6b', '#8e8e8e'
    ];

    function drawPieChart(canvas, aggregated, totalMinutes) {
      if (!canvas || !canvas.getContext) return;
      var ctx = canvas.getContext('2d');
      var w = canvas.width = 280;
      var h = canvas.height = 280;
      var cx = w / 2;
      var cy = h / 2;
      var r = 110;

      ctx.clearRect(0, 0, w, h);

      if (totalMinutes === 0 || aggregated.length === 0) {
        ctx.fillStyle = '#eee';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      var startAngle = -Math.PI / 2;
      aggregated.forEach(function(item, i) {
        var sliceAngle = (item.minutes / totalMinutes) * Math.PI * 2;
        var endAngle = startAngle + sliceAngle;

        ctx.fillStyle = CHART_COLORS[i % CHART_COLORS.length];
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fill();

        // Label
        if (sliceAngle > 0.15) {
          var midAngle = startAngle + sliceAngle / 2;
          var lx = cx + Math.cos(midAngle) * (r * 0.65);
          var ly = cy + Math.sin(midAngle) * (r * 0.65);
          var pct = Math.round((item.minutes / totalMinutes) * 100);
          ctx.fillStyle = '#fff';
          ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(item.label, lx, ly - 8);
          ctx.fillText(pct + '%', lx, ly + 8);
        }

        startAngle = endAngle;
      });
    }

    /* =========================================
       Render Summary (reused in screen 3 & 4)
    ========================================= */
    function renderSummary(session, container) {
      container.innerHTML = '';
      var durations = calcDurations(session);
      var aggregated = aggregateDurations(durations);
      var totalMinutes = durations.reduce(function(s, d) { return s + d.minutes; }, 0);

      // 3-1 Action list
      var sec1 = document.createElement('div');
      sec1.className = 'summary-section';
      var h1 = document.createElement('h2');
      h1.textContent = '行動一覧';
      sec1.appendChild(h1);
      session.entries.forEach(function(e) {
        var div = document.createElement('div');
        div.className = 'summary-entry';
        div.textContent = '\u301C' + e.time + '\u3000' + e.label;
        sec1.appendChild(div);
      });
      container.appendChild(sec1);

      // 3-2 Time aggregation
      var sec2 = document.createElement('div');
      sec2.className = 'summary-section';
      var h2 = document.createElement('h2');
      h2.textContent = '時間集計';
      sec2.appendChild(h2);
      aggregated.forEach(function(a) {
        var div = document.createElement('div');
        div.className = 'time-aggregate';
        div.textContent = a.label + '：' + minToLabel(a.minutes);
        sec2.appendChild(div);
      });
      container.appendChild(sec2);

      // 3-3 Pie chart
      var sec3 = document.createElement('div');
      sec3.className = 'summary-section';
      var h3el = document.createElement('h2');
      h3el.textContent = '時間配分';
      sec3.appendChild(h3el);

      var chartDiv = document.createElement('div');
      chartDiv.className = 'chart-container';
      var canvas = document.createElement('canvas');
      chartDiv.appendChild(canvas);
      sec3.appendChild(chartDiv);

      // Legend
      var legendUl = document.createElement('ul');
      legendUl.className = 'chart-legend';
      aggregated.forEach(function(a, i) {
        var li = document.createElement('li');
        var colorBox = document.createElement('span');
        colorBox.className = 'legend-color';
        colorBox.style.background = CHART_COLORS[i % CHART_COLORS.length];
        var text = document.createElement('span');
        var pct = totalMinutes > 0 ? Math.round((a.minutes / totalMinutes) * 100) : 0;
        text.textContent = a.label + ' (' + pct + '%, ' + minToLabel(a.minutes) + ')';
        li.appendChild(colorBox);
        li.appendChild(text);
        legendUl.appendChild(li);
      });
      sec3.appendChild(legendUl);
      container.appendChild(sec3);

      // Draw chart after DOM insertion
      requestAnimationFrame(function() {
        drawPieChart(canvas, aggregated, totalMinutes);
      });
    }

    /* =========================================
       Screen 3: Summary actions
    ========================================= */
    function buildCopyText(session) {
      var lines = [];
      lines.push(session.date + ' 開始' + session.startTime + ' 終了' + (session.endTime || ''));
      lines.push('');
      session.entries.forEach(function(e) {
        lines.push('\u301C' + e.time + '\u3000' + e.label);
      });
      var durations = calcDurations(session);
      var aggregated = aggregateDurations(durations);
      lines.push('');
      lines.push('--- 時間集計 ---');
      aggregated.forEach(function(a) {
        lines.push(a.label + '：' + minToLabel(a.minutes));
      });
      return lines.join('\n');
    }

    function copySummary() {
      var text = buildCopyText(currentSession);
      var btn = document.getElementById('copy-btn');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          btn.textContent = 'コピー完了！';
          setTimeout(function() { btn.textContent = 'コピー'; }, 2000);
        });
      } else {
        // Fallback for file:// protocol
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          btn.textContent = 'コピー完了！';
          setTimeout(function() { btn.textContent = 'コピー'; }, 2000);
        } catch(e) {}
        document.body.removeChild(ta);
      }
    }

    function saveAndExit() {
      var sessions = loadSessions();
      sessions.push({
        id: currentSession.id,
        date: currentSession.date,
        startTime: currentSession.startTime,
        endTime: currentSession.endTime,
        entries: currentSession.entries
      });
      saveSessions(sessions);
      currentSession = null;
      showScreen('start');
    }

    function exitWithoutSave() {
      if (confirm('保存せずに終了しますか？記録は破棄されます。')) {
        currentSession = null;
        showScreen('start');
      }
    }

    /* =========================================
       Screen 4: History
    ========================================= */
    function showHistory() {
      renderSessionList();
      renderWeeklySummary();
      showScreen('history');
    }

    function switchTab(tabName, btnEl) {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btnEl.classList.add('active');
      document.getElementById('tab-sessions').style.display = tabName === 'sessions' ? 'block' : 'none';
      document.getElementById('tab-weekly').style.display = tabName === 'weekly' ? 'block' : 'none';
    }

    function renderSessionList() {
      var container = document.getElementById('tab-sessions');
      var sessions = loadSessions();
      sessions.sort(function(a, b) { return Number(b.id) - Number(a.id); });

      if (sessions.length === 0) {
        container.innerHTML = '<div class="empty-msg">保存された記録はありません</div>';
        return;
      }

      container.innerHTML = '';
      sessions.forEach(function(session, idx) {
        var card = document.createElement('div');
        card.className = 'session-card';

        var header = document.createElement('div');
        header.className = 'session-header';

        var info = document.createElement('span');
        info.className = 'session-info';
        var dateLabel = session.date.replace(/-/g, '/');
        var dow = dayOfWeek(session.date);
        info.textContent = dateLabel + '（' + dow + '）' + session.startTime + '\u301C' + (session.endTime || '');

        var meta = document.createElement('span');
        meta.className = 'session-meta';
        meta.textContent = '記録' + session.entries.length + '件';

        var delBtn = document.createElement('button');
        delBtn.className = 'session-delete-btn';
        delBtn.textContent = '削除';
        delBtn.onclick = function(e) {
          e.stopPropagation();
          deleteSession(session.id);
        };

        header.appendChild(info);
        header.appendChild(meta);
        header.appendChild(delBtn);

        var detail = document.createElement('div');
        detail.className = 'session-detail';
        detail.id = 'detail-' + session.id;

        header.onclick = function() {
          var d = document.getElementById('detail-' + session.id);
          var isOpen = d.classList.contains('open');
          if (!isOpen && d.innerHTML === '') {
            renderSessionDetail(session, d);
          }
          d.classList.toggle('open');
        };

        card.appendChild(header);
        card.appendChild(detail);
        container.appendChild(card);
      });
    }

    function renderSessionDetail(session, container) {
      // Entries
      var sec1 = document.createElement('div');
      sec1.className = 'summary-section';
      var h1 = document.createElement('h3');
      h1.textContent = '行動一覧';
      sec1.appendChild(h1);
      session.entries.forEach(function(e) {
        var div = document.createElement('div');
        div.className = 'summary-entry';
        div.textContent = '\u301C' + e.time + '\u3000' + e.label;
        sec1.appendChild(div);
      });
      container.appendChild(sec1);

      // Time aggregation
      var durations = calcDurations(session);
      var aggregated = aggregateDurations(durations);
      var totalMinutes = durations.reduce(function(s, d) { return s + d.minutes; }, 0);

      var sec2 = document.createElement('div');
      sec2.className = 'summary-section';
      var h2 = document.createElement('h3');
      h2.textContent = '時間集計';
      sec2.appendChild(h2);
      aggregated.forEach(function(a) {
        var div = document.createElement('div');
        div.className = 'time-aggregate';
        div.textContent = a.label + '：' + minToLabel(a.minutes);
        sec2.appendChild(div);
      });
      container.appendChild(sec2);

      // Pie chart
      var sec3 = document.createElement('div');
      sec3.className = 'summary-section';
      var h3el = document.createElement('h3');
      h3el.textContent = '時間配分';
      sec3.appendChild(h3el);

      var chartDiv = document.createElement('div');
      chartDiv.className = 'chart-container';
      var canvas = document.createElement('canvas');
      chartDiv.appendChild(canvas);
      sec3.appendChild(chartDiv);

      var legendUl = document.createElement('ul');
      legendUl.className = 'chart-legend';
      aggregated.forEach(function(a, i) {
        var li = document.createElement('li');
        var colorBox = document.createElement('span');
        colorBox.className = 'legend-color';
        colorBox.style.background = CHART_COLORS[i % CHART_COLORS.length];
        var text = document.createElement('span');
        var pct = totalMinutes > 0 ? Math.round((a.minutes / totalMinutes) * 100) : 0;
        text.textContent = a.label + ' (' + pct + '%, ' + minToLabel(a.minutes) + ')';
        li.appendChild(colorBox);
        li.appendChild(text);
        legendUl.appendChild(li);
      });
      sec3.appendChild(legendUl);
      container.appendChild(sec3);

      requestAnimationFrame(function() {
        drawPieChart(canvas, aggregated, totalMinutes);
      });
    }

    function deleteSession(id) {
      if (!confirm('この記録を削除しますか？')) return;
      var sessions = loadSessions();
      sessions = sessions.filter(function(s) { return s.id !== id; });
      saveSessions(sessions);
      renderSessionList();
      renderWeeklySummary();
    }

    /* =========================================
       Weekly Summary
    ========================================= */
    function renderWeeklySummary() {
      var container = document.getElementById('tab-weekly');
      var sessions = loadSessions();
      sessions.sort(function(a, b) { return Number(b.id) - Number(a.id); });

      if (sessions.length === 0) {
        container.innerHTML = '<div class="empty-msg">保存された記録はありません</div>';
        return;
      }

      // Group by week
      var weekMap = {};
      sessions.forEach(function(session) {
        var weekKey = getWeekStart(session.date);
        if (!weekMap[weekKey]) weekMap[weekKey] = [];
        weekMap[weekKey].push(session);
      });

      var weeks = Object.keys(weekMap).sort().reverse();
      container.innerHTML = '';

      weeks.forEach(function(weekKey) {
        var weekSessions = weekMap[weekKey];
        // Aggregate all durations across sessions in this week
        var totalMap = {};
        weekSessions.forEach(function(session) {
          var durations = calcDurations(session);
          durations.forEach(function(d) {
            if (!totalMap[d.label]) totalMap[d.label] = 0;
            totalMap[d.label] += d.minutes;
          });
        });

        var sorted = [];
        for (var k in totalMap) {
          sorted.push({ label: k, minutes: totalMap[k] });
        }
        sorted.sort(function(a, b) { return b.minutes - a.minutes; });
        var top3 = sorted.slice(0, 3);

        var div = document.createElement('div');
        div.className = 'week-summary';

        var title = document.createElement('div');
        title.className = 'week-title';
        title.textContent = weekKey + '週（' + weekSessions.length + 'セッション）';
        div.appendChild(title);

        var topDiv = document.createElement('div');
        topDiv.className = 'week-top';
        var topTexts = top3.map(function(t, i) {
          return (i + 1) + '位：' + t.label + '（' + minToLabel(t.minutes) + '）';
        });
        topDiv.textContent = topTexts.join('　');
        div.appendChild(topDiv);

        container.appendChild(div);
      });
    }
  </script>
